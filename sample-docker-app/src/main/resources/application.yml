server:
  port: 9090

spring:
  application:
    name: sample-docker-app

app:
  license:
    path: ${LICENSE_PATH:/etc/app/license.lic}
    audience: ${LICENSE_AUDIENCE:docker-app-prod}
    issuer: ${LICENSE_ISSUER:https://control-panel.example.com}
    refresh-from-url: ${LICENSE_JWKS_URL:}
    refresh-interval: ${LICENSE_REFRESH_INTERVAL:PT24H}
    clock-skew: ${LICENSE_CLOCK_SKEW:PT5M}
    read-only-on-expiry: ${LICENSE_READ_ONLY_ON_EXPIRY:true}
    strict: ${LICENSE_STRICT:false}
    # Signed CRL (typ=crl+jwt) published by the control panel. When set, the
    # verifier periodically fetches and verifies it to deny revoked licenses;
    # blank disables revocation checking (RevocationChecker.none()).
    # Example: https://control-panel.example.com/api/v1/licenses/crl
    crl-url: ${LICENSE_CRL_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,license
  endpoint:
    health:
      show-details: when-authorized
    license:
      enabled: true

logging:
  level:
    com.example.licenseverifier: INFO
    com.example.sample: INFO
