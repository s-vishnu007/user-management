# HTTP -> HTTPS redirect.
#
# This nginx serves the static admin SPA only. When TLS is terminated upstream
# (load balancer / ingress) the redirect is gated on the forwarded proto so we
# do not loop; when TLS is terminated in-container, use the 443 server block
# below (uncomment the listen/ssl_* lines and mount the certs).
server {
  listen 80;
  server_name _;

  # If TLS is terminated upstream, force HTTPS based on the forwarded proto.
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # If this container terminates TLS, redirect all plain-HTTP traffic to HTTPS.
  # Uncomment the next line (and the 443 server block) for the self-contained
  # docker-compose TLS setup; leave commented when TLS is terminated upstream.
  # return 301 https://$host$request_uri;

  root /usr/share/nginx/html;
  index index.html;

  # Security response headers (apply to every response, including errors).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8080; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
  # HSTS is only meaningful once TLS terminates (harmless but inert over plain HTTP).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}

# In-container TLS terminator. Uncomment and mount certs (docker-compose volume)
# to serve the SPA directly over HTTPS; also EXPOSE 443 in admin-ui/Dockerfile and
