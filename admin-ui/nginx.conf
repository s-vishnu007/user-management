# HTTP -> HTTPS redirect.
#
# This nginx serves the static admin SPA only. When TLS is terminated upstream
# (load balancer / ingress) the redirect is gated on the forwarded proto so we
# do not loop; when TLS is terminated in-container, use the 443 server block
# below (uncomment the listen/ssl_* lines and mount the certs).
#
# This file is processed by the official nginx image's envsubst templating
# (placed under /etc/nginx/templates and rendered to /etc/nginx/conf.d). The CSP
# connect-src is taken from ${CSP_CONNECT_SRC} so the allowed API origin is
# configurable per deployment instead of hardcoded to localhost. The Dockerfile
# sets a sensible default; override it (e.g. to your control-plane API origin) at
# `docker run`/compose time.

# The security headers are defined once here and re-applied in EVERY location
# block. nginx's add_header does NOT inherit into a location that defines its own
# add_header directives, so without repeating them the /assets/ responses would
# ship with no CSP / X-Frame-Options / nosniff (finding P3).

server {
  listen 80;
  server_name _;

  # If TLS is terminated upstream, force HTTPS based on the forwarded proto.
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # If this container terminates TLS, redirect all plain-HTTP traffic to HTTPS.
  # Uncomment the next line (and the 443 server block) for the self-contained
  # docker-compose TLS setup; leave commented when TLS is terminated upstream.
  # return 301 https://$host$request_uri;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ${CSP_CONNECT_SRC}; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }

  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable" always;
    # Re-emit the security headers (not inherited once this block sets its own).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ${CSP_CONNECT_SRC}; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  }
}

