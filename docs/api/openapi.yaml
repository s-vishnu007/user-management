          schema: { type: string, format: uuid }
        - in: query
          name: targetType
          schema: { type: string }
        - in: query
          name: targetId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paged audit entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntryPage'

  # ============================================================
