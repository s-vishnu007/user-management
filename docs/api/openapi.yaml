    get:
      tags: [sso]
      summary: Begin an SSO login flow for an org.
      security: []
      responses:
        '302':
          description: Redirect to the IdP authorization endpoint.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # api keys
  # ============================================================
  /api/v1/orgs/{orgId}/api-keys:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [apikeys]
      summary: List API keys for an org.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
    post:
      tags: [apikeys]
      summary: Create an org-scoped API key. The plaintext key is returned ONCE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
      responses:
        '200':
          description: Created. Save the `key` value — it is shown only here.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'

  /api/v1/orgs/{orgId}/api-keys/{apiKeyId}:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - in: path
        name: apiKeyId
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [apikeys]
      summary: Revoke an API key. Scoped to the path org (404 if the key is not in this org).
      responses:
        '204':
          description: Revoked.
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # privacy (GDPR/CCPA)
  # ============================================================
  /api/v1/privacy/users/{userId}/export:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    get:
      tags: [privacy]
      summary: Export all personal data held for a user (right of access / data portability).
      description: |
        Returns a machine-readable bundle of the subject's profile, memberships, role assignments,
        and related operational records. Authorized for the subject themselves, an org admin over
        the subject, or a super-admin. The request is recorded in the erasure_log ledger.
      responses:
        '200':
          description: Data-subject export bundle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExport'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/privacy/users/{userId}/erase:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    post:
      tags: [privacy]
      summary: Erase / pseudonymise a user's personal data (right to erasure).
      description: |
        Pseudonymises PII in place via the existing repositories (the immutable audit log is
        preserved but no longer resolves to the natural person), bumps the user's token version to
        revoke sessions, and records the request in the erasure_log ledger. Authorized for a
        super-admin or an org admin over the subject.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Erasure completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErasureRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/privacy/orgs/{orgId}/erase:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    post:
      tags: [privacy]
      summary: Off-board a tenant — erase / pseudonymise an organization's data.
      description: Tenant off-boarding. Authorized for a super-admin. Recorded in the erasure_log ledger.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Off-boarding completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErasureRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # webhooks
  # ============================================================
  /api/v1/orgs/{orgId}/webhooks:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [webhooks]
      summary: List webhook subscriptions for an org.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookSubscription'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [webhooks]
      summary: Register an outbound webhook endpoint for an org.
      description: |
        Registers an HTTPS endpoint and an HMAC signing secret (stored encrypted at rest). Matching
        domain events are delivered as signed POSTs with capped exponential-backoff retries up to
        `app.webhooks.max-attempts`. The plaintext `secret` is returned ONCE at creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscriptionCreate'
      responses:
        '201':
          description: Created. Save the `secret` — it is shown only here.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscriptionCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/orgs/{orgId}/webhooks/{webhookId}:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - in: path
        name: webhookId
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [webhooks]
      summary: Delete a webhook subscription.
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orgs/{orgId}/webhooks/{webhookId}/deliveries:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - in: path
        name: webhookId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [webhooks]
      summary: List recent delivery attempts for a webhook subscription.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookDelivery'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # events
  # ============================================================
  /api/v1/events:
    get:
      tags: [events]
      summary: Poll outbox-derived domain events.
      parameters:
        - in: query
          name: since
          schema: { type: string, format: date-time }
          description: Return events with `occurredAt >= since`.
      responses:
        '200':
          description: Event list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DomainEvent'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin session JWT from `POST /api/v1/auth/login`.
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Long-lived programmatic key.
        Format: `Authorization: ApiKey <token>` where `<token>` is the value returned
        once by `POST /api/v1/orgs/{orgId}/api-keys`.

  parameters:
    OrgIdParam:
      in: path
      name: orgId
      required: true
      schema: { type: string, format: uuid }
    UserIdParam:
      in: path
      name: userId
      required: true
      schema: { type: string, format: uuid }
    SubscriptionIdParam:
      in: path
      name: subscriptionId
      required: true
      schema: { type: string, format: uuid }
    JtiParam:
      in: path
      name: jti
      required: true
      schema: { type: string }
      description: License JWT id (jti claim).
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string, maxLength: 255 }
      description: |
        Optional on mutating endpoints. A retry carrying the same key, method, path, actor, and
        request body replays the original response instead of re-executing the side effect. Stored
        for `app.idempotency.ttl`.
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeParam:
      in: query
      name: size
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  responses:
    BadRequest:
      description: Request body or parameters invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Forbidden:
      description: Authenticated but not authorized.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotFound:
      description: Resource does not exist or is hidden from this caller.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Conflict:
      description: Conflicting state (e.g. unique-constraint violation).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ScimBadRequest:
      description: SCIM request invalid.
      content:
        application/scim+json:
          schema:
            $ref: '#/components/schemas/ScimError'
    ScimUnauthorized:
      description: Missing or invalid SCIM credentials.
      content:
        application/scim+json:
          schema:
            $ref: '#/components/schemas/ScimError'
    ScimForbidden:
      description: SCIM credential lacks the scim.manage scope or org access.
      content:
        application/scim+json:
          schema:
            $ref: '#/components/schemas/ScimError'
    ScimNotFound:
      description: SCIM resource does not exist in the caller's org.
      content:
        application/scim+json:
          schema:
            $ref: '#/components/schemas/ScimError'
    ScimConflict:
      description: SCIM uniqueness conflict (e.g. userName/externalId already provisioned).
      content:
        application/scim+json:
          schema:
            $ref: '#/components/schemas/ScimError'

  schemas:

    # ---- shared / problem ----
    ProblemDetail:
      type: object
      description: RFC 7807 problem details.
      properties:
        type: { type: string, format: uri, example: 'about:blank' }
        title: { type: string, example: 'Bad Request' }
        status: { type: integer, example: 400 }
        detail: { type: string, example: 'Field `email` is required.' }
        instance: { type: string, format: uri }
        code: { type: string, example: 'validation_failed' }
      required: [title, status]

    ReasonRequest:
      type: object
      properties:
        reason: { type: string }

    PageMeta:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }
      required: [total, page, size]

    # ---- auth ----
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      description: |
        Unified login result. For a non-MFA account (or a completed step-2 MFA login) it carries the
        full session (`accessToken`, `expiresAt`, `user`) with `mfaRequired=false`. For an MFA-enabled
        account, step 1 returns `mfaRequired=true` with a short-lived `mfaChallenge` and NO session
        token; the client must call `POST /api/v1/auth/mfa/login` to obtain a session. Null fields are
        omitted from the response.
      required: [mfaRequired]
      properties:
        accessToken: { type: string, nullable: true, description: 'Session JWT (absent for an MFA challenge).' }
        expiresAt: { type: string, format: date-time, nullable: true }
        user:
          allOf: [ { $ref: '#/components/schemas/User' } ]
          nullable: true
        mfaRequired: { type: boolean }
        mfaChallenge: { type: string, nullable: true, description: 'Short-lived challenge for step-2 MFA login.' }
        mfaChallengeExpiresAt: { type: string, format: date-time, nullable: true }

    MfaLoginRequest:
      type: object
      required: [code]
      properties:
        challenge: { type: string, description: 'The challenge from POST /auth/login.' }
        email: { type: string, format: email, description: 'Fallback subject resolution when no challenge is supplied.' }
        code: { type: string, description: 'Current TOTP code.' }

    MfaEnrollResponse:
      type: object
      required: [secret, otpAuthUri]
      properties:
        secret: { type: string, description: 'Base32 TOTP secret (shown once).' }
        otpAuthUri: { type: string, description: 'otpauth:// URI for authenticator apps.' }

    MfaCodeRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    PasswordResetConfirm:
      type: object
      required: [token, newPassword]
      properties:
        token: { type: string }
        newPassword: { type: string, format: password, minLength: 8 }

    MeResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        orgs:
          type: array
          items: { $ref: '#/components/schemas/OrgMembership' }
        permissions:
          type: array
          items: { type: string }
      required: [user, orgs, permissions]

    # ---- user ----
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string }
        status:
          type: string
          enum: [ACTIVE, INVITED, DISABLED, DELETED]
        superAdmin: { type: boolean }
        createdAt: { type: string, format: date-time }
        lastLoginAt: { type: string, format: date-time, nullable: true }
      required: [id, email, status]

    UserUpdate:
      type: object
      properties:
        fullName: { type: string, maxLength: 255 }

    # ---- org ----
    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DELETED]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, slug, name]

    OrganizationCreate:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{1,62}[a-z0-9]$'
        name:
          type: string
          maxLength: 255

    OrganizationPage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Organization' }
          required: [items]

    OrgMember:
      type: object
      properties:
        orgId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER, VIEWER]
        addedAt: { type: string, format: date-time }
      required: [orgId, userId, role]

    OrgMembership:
      type: object
      properties:
        orgId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER, VIEWER]
      required: [orgId, role]

    OrgInvite:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER, VIEWER]

    OrgMemberPage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/OrgMember' }
          required: [items]

    # ---- rbac ----
    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        isSystem: { type: boolean }
      required: [id, code, name]

    Permission:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: 'subscription.write' }
        name: { type: string }
        description: { type: string }
        category: { type: string }
      required: [id, code]

    RolePage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Role' }
          required: [items]

    PermissionPage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Permission' }
          required: [items]

    AssignRoleRequest:
      type: object
      required: [roleCode]
      properties:
        roleCode: { type: string }
        orgId: { type: string, format: uuid, nullable: true }

    UserRoleAssignment:
      type: object
      properties:
        userId: { type: string, format: uuid }
        roleId: { type: string, format: uuid }
        roleCode: { type: string }
        orgId: { type: string, format: uuid, nullable: true }

    # ---- plans ----
    Plan:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        tier: { type: string }
        defaultTtlDays: { type: integer }
        active: { type: boolean }
        permissions:
          type: array
          items: { type: string }
        features:
          type: object
          additionalProperties: true
      required: [id, code, name]

    PlanCreate:
      type: object
      required: [code]
      properties:
        code: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 255 }
        description: { type: string }
        tier: { type: string, maxLength: 32 }
        defaultTtlDays: { type: integer }
        active: { type: boolean }
        permissions:
          type: array
          items: { type: string }
        features:
          type: object
          additionalProperties: true

    PlanUpdate:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        description: { type: string }
        tier: { type: string, maxLength: 32 }
        defaultTtlDays: { type: integer }
        active: { type: boolean }

    # ---- subscriptions ----
    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        planId: { type: string, format: uuid }
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        seats: { type: integer }
        notes: { type: string }
        overrides:
          type: array
          items: { $ref: '#/components/schemas/SubscriptionOverrideRecord' }
      required: [id, orgId, planId, status]

    SubscriptionStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, EXPIRED, CANCELLED]

    SubscriptionCreate:
      type: object
      required: [planId]
      properties:
        planId: { type: string, format: uuid }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        seats: { type: integer, minimum: 0 }
        notes: { type: string }
        overrides:
          type: array
          items: { $ref: '#/components/schemas/SubscriptionOverride' }

    SubscriptionOverride:
      type: object
      required: [type, key]
      properties:
        type:
          type: string
          enum: [PERMISSION, FEATURE]
        key: { type: string }
        op:
          type: string
          enum: [ADD, REMOVE, SET]
          description: Defaults vary by type; PERMISSION uses ADD/REMOVE, FEATURE uses SET.
        value:
          description: For FEATURE/SET. Boolean/integer/string.
          oneOf:
            - type: boolean
            - type: integer
            - type: string

    SubscriptionOverrideRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum: [PERMISSION, FEATURE]
        key: { type: string }
        value:
          oneOf:
            - type: boolean
            - type: integer
            - type: string
            - type: 'null'

    # ---- licenses ----
    # The license record as returned by the API (plan/permissions/features/seats live inside the
    # signed JWT, not in this DTO).
    LicenseToken:
      type: object
      properties:
        id: { type: string, format: uuid }
        jti: { type: string }
        subscriptionId: { type: string, format: uuid }
        kid: { type: string }
        issuedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }
        revokeReason: { type: string, nullable: true }
        fingerprint: { type: string, description: 'SHA-256 of the compact JWT.' }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        lastSeenIp: { type: string, nullable: true }
        status:
          type: string
          enum: [ACTIVE, REVOKED, EXPIRED]
      required: [jti, subscriptionId, kid, issuedAt, expiresAt, status]

    LicenseIssueRequest:
      type: object
      description: All fields optional; omit the body to use the plan/subscription defaults.
      properties:
        ttlDays:
          type: integer
          description: Override the plan's default TTL (days).
        audience:
          type: array
          items: { type: string }
          description: Target audience claim(s). Defaults to the configured default audience.
        notes: { type: string }

    LicenseIssueResponse:
      type: object
      required: [jti, kid, issuedAt, expiresAt, license, downloadUrl]
      properties:
        jti: { type: string }
        kid: { type: string }
        issuedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        license:
          type: string
          description: The compact-serialized signed license JWT (save directly, or fetch the .lic envelope via downloadUrl).
        downloadUrl:
          type: string
          example: '/api/v1/licenses/<jti>/download'

    HeartbeatRequest:
      type: object
      required: [nodeId]
      properties:
        nodeId:
          type: string
          maxLength: 190
          description: The licensed app's self-reported node identifier (host id / instance id).

    HeartbeatResponse:
      type: object
      properties:
        jti: { type: string }
        nodeId: { type: string }
        activeSeats:
          type: integer
          description: Distinct nodes seen within app.licensing.lease-window.
        seats:
          type: integer
          description: Licensed seat cap (0 = uncapped).
        lastSeenAt: { type: string, format: date-time }

    LicenseEnvelope:
      type: object
      required: [license]
      properties:
        license: { type: string, description: 'The compact-serialized signed JWT.' }
        issued_at: { type: string, format: date-time }
        customer: { type: string }
        plan: { type: string }
        expires_at: { type: string, format: date-time }
        notes: { type: string }

    RevocationList:
      type: object
      properties:
        revokedSince: { type: string, format: date-time, nullable: true, description: 'Echoes the `since` query param (null if omitted).' }
        generatedAt: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            required: [jti, revokedAt]
            properties:
              jti: { type: string }
              revokedAt: { type: string, format: date-time }
              reason: { type: string, nullable: true }
      required: [generatedAt, items]

    # ---- keys / jwks ----
    SigningKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        kid: { type: string }
        algorithm: { type: string, example: 'EdDSA' }
        status:
          type: string
          enum: [ACTIVE, RETIRED, COMPROMISED]
          description: |
            ACTIVE keys sign new licenses; RETIRED keys are kept for verification within the retention
            window; COMPROMISED keys are dropped from the JWKS immediately (verifiers stop trusting them).
        createdAt: { type: string, format: date-time }
        retiredAt: { type: string, format: date-time, nullable: true }
        publicKeyPem: { type: string, description: 'PEM-encoded Ed25519 public key.' }
      required: [kid, algorithm, status]

    KekRotationResult:
      type: object
      description: Result of a key-encryption-key rotation.
      properties:
        reEncrypted:
          type: integer
          description: Number of signing-key rows re-encrypted under the active KEK.
      required: [reEncrypted]

    CompromiseResult:
      type: object
      description: Result of flagging a signing key COMPROMISED.
      properties:
        kid: { type: string, description: 'The flagged signing key id.' }
        replacementGenerated:
          type: boolean
          description: True only when the compromised key had been ACTIVE and a fresh ACTIVE key was generated.
        replacement:
          allOf: [ { $ref: '#/components/schemas/SigningKey' } ]
          nullable: true
          description: The newly generated ACTIVE key, present only when replacementGenerated is true.
      required: [kid, replacementGenerated]

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            additionalProperties: true
            description: A JWK per RFC 7517. For this system, OKP / Ed25519.

    # ---- usage ----
    UsageEvent:
      type: object
      required: [featureKey, quantity, occurredAt]
      properties:
        featureKey: { type: string, example: 'export.pdf' }
        quantity:
          type: number
          minimum: 0
        occurredAt: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true

    UsageIngestRequest:
      type: object
      required: [jti, events]
      properties:
        jti: { type: string }
        events:
          type: array
          items: { $ref: '#/components/schemas/UsageEvent' }

    UsageIngestResponse:
      type: object
      properties:
        eventsAccepted: { type: integer }
        subscriptionId: { type: string, format: uuid }

    UsageQuota:
      type: object
      properties:
        featureKey: { type: string }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        limit:
          type: number
          nullable: true
        consumed:
          type: number

    UsageReport:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              featureKey: { type: string }
              quantity: { type: number }
              occurredAt: { type: string, format: date-time }
              jti: { type: string }
        quotas:
          type: array
          items: { $ref: '#/components/schemas/UsageQuota' }

    # ---- audit ----
    AuditEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid, nullable: true }
        actorOrgId: { type: string, format: uuid, nullable: true }
        action: { type: string, example: 'subscription.created' }
        targetType: { type: string }
        targetId: { type: string }
        payloadJson: { type: string }
        ipAddress: { type: string, nullable: true }
        occurredAt: { type: string, format: date-time }
        outcome:
          type: string
          enum: [SUCCESS, DENIED, FAILED]
          description: Whether the audited action succeeded, was denied, or failed.
      required: [id, action, occurredAt]

    AuditEntryPage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/AuditEntry' }
          required: [items]

    # ---- sso ----
    SsoProvider:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        type:
          type: string
          enum: [SAML, OIDC]
        config:
          type: string
          description: Serialized JSON config (provider-specific).
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, orgId, type, enabled]

    SsoProviderCreate:
      type: object
      required: [type, config]
      properties:
        type:
          type: string
          enum: [SAML, OIDC]
        config:
          type: object
          additionalProperties: true
          description: Provider-specific config; see `docs/integration-guide.md`.

    SsoTestResult:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }
        metadata:
          type: object
          additionalProperties: true

    # ---- apikeys ----
    ApiKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        name: { type: string }
        keyPrefix: { type: string }
        scopes: { type: string, description: 'JSON-encoded list of scope codes.' }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        revokedAt: { type: string, format: date-time, nullable: true }
      required: [id, orgId, name, keyPrefix, createdAt]

    ApiKeyCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 255 }
        scopes:
          type: array
          items: { type: string }

    ApiKeyCreateResponse:
      type: object
      required: [id, name, key, keyPrefix, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key:
          type: string
          description: |
            Plaintext token. Shown only at creation; the server stores only a hashed copy.
        keyPrefix: { type: string }
        scopes:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    # ---- events ----
    DomainEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        aggregateType: { type: string, example: 'subscription' }
        aggregateId: { type: string }
        eventType: { type: string, example: 'SubscriptionActivated' }
        payloadJson: { type: string }
        occurredAt: { type: string, format: date-time }
        publishedAt: { type: string, format: date-time, nullable: true }
      required: [id, aggregateType, eventType, occurredAt]

    # ---- privacy ----
    DataExport:
      type: object
      description: |
        Machine-readable bundle of all personal data held for a data subject (right of access /
        data portability). The concrete sub-objects mirror the subject's profile and related records.
      properties:
        subjectType:
          type: string
          enum: [user, org]
        subjectId: { type: string, format: uuid }
        generatedAt: { type: string, format: date-time }
        data:
          type: object
          additionalProperties: true
          description: The exported personal data (profile, memberships, role assignments, etc.).
      required: [subjectType, subjectId, generatedAt, data]

    ErasureRecord:
      type: object
      description: A row from the erasure_log ledger evidencing a completed DSAR/erasure operation.
      properties:
        id: { type: string, format: uuid }
        subjectType:
          type: string
          enum: [user, org]
        subjectId: { type: string, format: uuid }
        action:
          type: string
          enum: [export, erase]
        requestedBy: { type: string, format: uuid, nullable: true }
        requestedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
      required: [id, subjectType, subjectId, action, requestedAt]

    # ---- webhooks ----
    WebhookSubscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        url: { type: string, format: uri, description: 'HTTPS endpoint that receives signed event POSTs.' }
        eventTypes:
          type: string
          nullable: true
          description: 'CSV of event types to deliver; null = all events.'
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, orgId, url, active, createdAt]

    WebhookSubscriptionCreate:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: 'Must be HTTPS.' }
        eventTypes:
          type: array
          items: { type: string }
          description: Event types to deliver; omit/empty to receive all events.
        active: { type: boolean, default: true }

    WebhookSubscriptionCreateResponse:
      type: object
      required: [id, orgId, url, secret, active, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        url: { type: string, format: uri }
        secret:
          type: string
          description: |
            HMAC signing secret. Shown ONLY at creation; the server stores only an encrypted copy.
            Use it to verify the signature header on delivered webhook POSTs.
        eventTypes: { type: string, nullable: true }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }

    WebhookDelivery:
      type: object
      description: One delivery attempt record per (subscription, event), driving at-least-once delivery.
      properties:
        id: { type: string, format: uuid }
        subscriptionId: { type: string, format: uuid }
        eventId: { type: string, format: uuid, description: 'The outbox event id being delivered.' }
        status:
          type: string
          enum: [PENDING, DELIVERED, FAILED]
        attempts: { type: integer }
        responseStatus: { type: integer, nullable: true }
        nextAttemptAt: { type: string, format: date-time, nullable: true }
        lastError: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        deliveredAt: { type: string, format: date-time, nullable: true }
      required: [id, subscriptionId, eventId, status, attempts, createdAt]

    # ---- scim (SCIM 2.0, RFC 7643/7644) ----
    ScimName:
      type: object
      description: SCIM 2.0 `name` complex attribute (RFC 7643 §4.1.1).
      properties:
        formatted: { type: string, description: 'Full name; maps to users.full_name.' }
        givenName: { type: string }
        familyName: { type: string }

    ScimEmail:
      type: object
      description: SCIM 2.0 multi-valued `emails` entry. The control panel emits one primary work email.
      properties:
        value: { type: string, format: email }
        type: { type: string, example: 'work' }
        primary: { type: boolean }
      required: [value]

    ScimUser:
      type: object
      description: |
        SCIM 2.0 core User resource (`urn:ietf:params:scim:schemas:core:2.0:User`). `id` is the per-org
        SCIM resource id (the mapping id), `userName` is the control-panel email, and `active` mirrors
        `users.status == ACTIVE`. Optional attributes are omitted when unset.
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:schemas:core:2.0:User']
        id: { type: string, description: 'Per-org SCIM resource id (the scim_user_mappings id).' }
        externalId: { type: string, description: 'The IdP-assigned id; unique within the org.' }
        userName: { type: string, format: email, description: 'The control-panel email (unique login).' }
        name: { $ref: '#/components/schemas/ScimName' }
        displayName: { type: string }
        emails:
          type: array
          items: { $ref: '#/components/schemas/ScimEmail' }
        active: { type: boolean }
        meta:
          type: object
          properties:
            resourceType: { type: string, example: 'User' }
            location: { type: string, example: '/scim/v2/Users/<id>' }
      required: [userName]

    ScimListResponse:
      type: object
      description: SCIM 2.0 ListResponse envelope (RFC 7644 §3.4.2). startIndex/itemsPerPage are 1-based.
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:api:messages:2.0:ListResponse']
        totalResults: { type: integer }
        startIndex: { type: integer }
        itemsPerPage: { type: integer }
        Resources:
          type: array
          items: { $ref: '#/components/schemas/ScimUser' }
      required: [schemas, totalResults, startIndex, itemsPerPage, Resources]

    ScimError:
      type: object
      description: SCIM 2.0 Error response (RFC 7644 §3.12). Distinct from RFC-7807 ProblemDetail.
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:api:messages:2.0:Error']
        status: { type: string, description: 'HTTP status code as a string.', example: '404' }
        scimType: { type: string, description: 'Optional SCIM error keyword.', example: 'uniqueness' }
        detail: { type: string }
      required: [schemas, status]

    # ---- billing ----
    BillingAccount:
      type: object
      description: One billing account per organization, binding it to a (provider, customer, currency).
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        provider: { type: string, example: 'manual', description: 'BillingProvider name that created the account.' }
        externalCustomerId: { type: string, nullable: true, description: 'Provider customer id (locally generated for the manual provider).' }
        currency: { type: string, example: 'USD', description: 'ISO-4217 currency code.' }
        createdAt: { type: string, format: date-time }
      required: [id, orgId, provider, currency, createdAt]

    InvoiceStatus:
      type: string
      enum: [DRAFT, ISSUED, PAID, VOID]

    Invoice:
      type: object
      description: A rated billing period for a single subscription.
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        subscriptionId: { type: string, format: uuid }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        currency: { type: string, example: 'USD' }
        totalAmount:
          type: number
          description: Sum of the line-item amounts (in the invoice currency), persisted denormalized.
        issuedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, orgId, subscriptionId, periodStart, periodEnd, status, currency, totalAmount, createdAt]

    InvoiceLineItem:
      type: object
      description: One rated line of an invoice — a feature's metered quantity times its unit amount.
      properties:
        id: { type: string, format: uuid }
        invoiceId: { type: string, format: uuid }
        featureKey: { type: string }
        quantity: { type: number }
        unitAmount: { type: number }
        amount: { type: number, description: 'quantity * unitAmount.' }
        description: { type: string, nullable: true }
      required: [id, invoiceId, featureKey, quantity, unitAmount, amount]

    InvoiceDetail:
      allOf:
        - $ref: '#/components/schemas/Invoice'
        - type: object
          properties:
            lineItems:
              type: array
              items: { $ref: '#/components/schemas/InvoiceLineItem' }
          required: [lineItems]

    InvoiceGenerateRequest:
      type: object
      description: Selects the subscription whose usage is rated into a new DRAFT invoice for the org.
      required: [subscriptionId]
      properties:
        subscriptionId: { type: string, format: uuid }
