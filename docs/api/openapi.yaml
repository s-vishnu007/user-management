openapi: 3.1.0
info:
  title: User Management Control Panel API
  version: 0.2.0
  description: |
    Control-plane API for the user-management + licensing system.

    Covers admin authentication (incl. TOTP MFA), organization/user/RBAC management, plan &
    subscription administration, full license lifecycle (issue / download / read / revoke / CRL /
    heartbeat), signing-key rotation & JWKS publication, usage ingestion, audit log access, SSO
    configuration, API key management, GDPR/CCPA privacy (export & erasure), outbound webhooks,
    and the domain event stream.

    Two authentication schemes are supported:
      - **bearerAuth**: short-lived admin session JWT, issued by `POST /api/v1/auth/login`
        (or `POST /api/v1/auth/mfa/login` when the account has MFA enabled).
      - **apiKeyAuth**: long-lived programmatic key, sent as `Authorization: ApiKey <token>`.

    Authorization is tenant-scoped: org-scoped resources resolve the target resource's owning org
    and require either super-admin, an api-key bound to that org, or org membership/role — a global
    authority alone never grants cross-tenant access.

    The public endpoints `/.well-known/jwks.json`, `GET /api/v1/licenses/crl`, and
    `GET /api/v1/licenses/revoked` are unauthenticated so offline verifiers can fetch key material
    and the revocation list without credentials.

    Mutating endpoints accept an optional `Idempotency-Key` request header: a retry carrying the same
    key (and identical body) replays the original response instead of re-executing the side effect.

    Error responses follow [RFC 7807 Problem Details](https://datatracker.ietf.org/doc/html/rfc7807).
  contact:
    name: Control Panel Team
    email: support@control-panel.example.com
  license:
    name: Proprietary

servers:
  - url: https://control-panel.example.com
    description: Production
  - url: https://staging.control-panel.example.com
    description: Staging
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: auth
    description: Admin login, password reset, current-user info.
  - name: orgs
    description: Tenant organizations and their members.
  - name: users
    description: User profile management.
  - name: rbac
    description: Control-panel roles, permissions, role assignments.
  - name: plans
    description: Subscription plan catalog.
  - name: subscriptions
    description: Org subscriptions, status transitions, and overrides.
  - name: licenses
    description: License issue, download, read, revoke, signed CRL, and seat/node heartbeat.
  - name: keys
    description: Signing key generation, rotation, key-encryption-key (KEK) rotation, and compromise.
  - name: scim
    description: SCIM 2.0 user provisioning / deprovisioning for enterprise IdPs.
  - name: billing
    description: Per-org billing account, usage-rated invoices, and invoice lifecycle.
  - name: jwks
    description: Public JWKS endpoint.
  - name: usage
    description: Usage event ingestion and reporting.
  - name: audit
    description: Immutable audit log.
  - name: sso
    description: Per-org SAML / OIDC configuration.
  - name: apikeys
    description: Programmatic API key administration.
  - name: privacy
    description: GDPR/CCPA data-subject export and right-to-erasure.
  - name: webhooks
    description: Per-org outbound webhook subscriptions (signed, retried) and delivery status.
  - name: events
    description: Outbox-derived domain event stream.

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:

  # ============================================================
  # auth
  # ============================================================
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Exchange email + password for an admin session JWT (or an MFA challenge).
      description: |
        On success for a non-MFA account, returns the session token (`mfaRequired=false`).
        When the account has TOTP MFA enabled, the password alone yields only a short-lived
        `mfaChallenge` (`mfaRequired=true`) and **no** `accessToken`; the client must then call
        `POST /api/v1/auth/mfa/login` with the challenge and a current TOTP code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, or an MFA challenge issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/mfa/login:
    post:
      tags: [auth]
      summary: Complete a two-step login by verifying a TOTP code against the MFA challenge.
      description: |
        Step 2 of MFA login. Supply the `challenge` from `POST /api/v1/auth/login` (or, as a
        fallback, the `email`) plus a current TOTP `code`. Public, since the caller has no session
        yet — the bearer of a valid challenge + correct code is the authenticated user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaLoginRequest'
      responses:
        '200':
          description: MFA verified; full session issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/mfa/enroll:
    post:
      tags: [auth]
      summary: Begin TOTP MFA enrollment for the current user.
      description: |
        Returns the base32 `secret` and an `otpauth://` URI to load into an authenticator app.
        The secret is shown ONCE; MFA is not active until a code is confirmed via `/auth/mfa/verify`.
      responses:
        '200':
          description: Enrollment started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaEnrollResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/mfa/verify:
    post:
      tags: [auth]
      summary: Confirm MFA enrollment by verifying a TOTP code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaCodeRequest'
      responses:
        '204':
          description: MFA enabled for the user.
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/mfa/disable:
    post:
      tags: [auth]
      summary: Disable MFA for the current user (idempotent).
      responses:
        '204':
          description: MFA disabled.

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Audit the intent to log out (stateless JWT — client drops the token).
      responses:
        '204':
          description: Logged out.

  /api/v1/auth/password-reset/request:
    post:
      tags: [auth]
      summary: Trigger a password-reset email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Always 200, regardless of whether the email exists (no enumeration).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  reset_token:
                    type: string
                    description: Only present when `app.auth.expose-reset-token=true` (dev/test).

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [auth]
      summary: Complete a password reset using a token from the email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
      responses:
        '204':
          description: Password updated.
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Return the currently authenticated user, org memberships, and granted permissions.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================
  # orgs
  # ============================================================
  /api/v1/orgs:
    get:
      tags: [orgs]
      summary: List organizations the current user belongs to.
      responses:
        '200':
          description: Paged org list (single page in the current implementation).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationPage'
    post:
      tags: [orgs]
      summary: Create an organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/orgs/{orgId}:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [orgs]
      summary: Fetch an organization.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orgs/{orgId}/members:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [orgs]
      summary: List members of an organization.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMemberPage'
    post:
      tags: [orgs]
      summary: Add a user as a member of the organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgInvite'
      responses:
        '201':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'

  /api/v1/orgs/{orgId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - $ref: '#/components/parameters/UserIdParam'
    delete:
      tags: [orgs]
      summary: Remove a member.
      responses:
        '204':
          description: Removed.

  /api/v1/orgs/{orgId}/transfer-owner:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    post:
      tags: [orgs]
      summary: Transfer the OWNER role to another member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newOwnerUserId]
              properties:
                newOwnerUserId: { type: string, format: uuid }
      responses:
        '204':
          description: Owner transferred.

  # ============================================================
  # users
  # ============================================================
  /api/v1/users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    get:
      tags: [users]
      summary: Get a user.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [users]
      summary: Update a user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/users/{userId}/deactivate:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    post:
      tags: [users]
      summary: Deactivate (suspend) a user. Requires `user.write`.
      responses:
        '204':
          description: Deactivated.
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userId}/delete:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    post:
      tags: [users]
      summary: Soft-delete a user. Requires `user.write`. Bumps token version (revokes sessions).
      responses:
        '204':
          description: Deleted.
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userId}/change-password:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    post:
      tags: [users]
      summary: Change own password (the caller must equal `{userId}`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string, format: password }
                newPassword: { type: string, format: password, minLength: 8 }
      responses:
        '204':
          description: Password changed.
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================
  # rbac
  # ============================================================
  /api/v1/rbac/roles:
    get:
      tags: [rbac]
      summary: List all control-panel roles.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePage'

  /api/v1/rbac/permissions:
    get:
      tags: [rbac]
      summary: List all control-panel permissions.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionPage'

  /api/v1/rbac/users/{userId}/roles:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    post:
      tags: [rbac]
      summary: Assign a role to a user (optionally scoped to an org).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        '201':
          description: Assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoleAssignment'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/rbac/users/{userId}/roles/{roleId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
      - in: path
        name: roleId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: orgId
        required: false
        schema: { type: string, format: uuid }
    delete:
      tags: [rbac]
      summary: Remove a role assignment.
      responses:
        '204':
          description: Removed.
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # plans
  # ============================================================
  /api/v1/plans:
    get:
      tags: [plans]
      summary: List plans.
      parameters:
        - in: query
          name: activeOnly
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
    post:
      tags: [plans]
      summary: Create a plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCreate'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /api/v1/plans/{planId}:
    parameters:
      - in: path
        name: planId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [plans]
      summary: Get a plan.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [plans]
      summary: Update top-level plan attributes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanUpdate'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /api/v1/plans/{planId}/permissions:
    parameters:
      - in: path
        name: planId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [plans]
      summary: Replace the plan's permission set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permissionCodes]
              properties:
                permissionCodes:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /api/v1/plans/{planId}/features:
    parameters:
      - in: path
        name: planId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [plans]
      summary: Replace the plan's feature map.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [features]
              properties:
                features:
                  type: object
                  additionalProperties: true
                  description: |
                    Map of feature key -> value. Permitted value types: boolean, integer, string.
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  # ============================================================
  # subscriptions
  # ============================================================
  /api/v1/orgs/{orgId}/subscriptions:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [subscriptions]
      summary: List subscriptions for an organization.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
    post:
      tags: [subscriptions]
      summary: Create a subscription under an organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreate'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /api/v1/subscriptions/{subscriptionId}:
    parameters:
      - $ref: '#/components/parameters/SubscriptionIdParam'
    get:
      tags: [subscriptions]
      summary: Get a subscription.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /api/v1/subscriptions/{subscriptionId}/suspend:
    parameters:
      - $ref: '#/components/parameters/SubscriptionIdParam'
    post:
      tags: [subscriptions]
      summary: Suspend an active subscription.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /api/v1/subscriptions/{subscriptionId}/reactivate:
    parameters:
      - $ref: '#/components/parameters/SubscriptionIdParam'
    post:
      tags: [subscriptions]
      summary: Reactivate a suspended subscription.
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /api/v1/subscriptions/{subscriptionId}/cancel:
    parameters:
      - $ref: '#/components/parameters/SubscriptionIdParam'
    post:
      tags: [subscriptions]
      summary: Cancel a subscription.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '200':
          description: Cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /api/v1/subscriptions/{subscriptionId}/overrides:
    parameters:
      - $ref: '#/components/parameters/SubscriptionIdParam'
    post:
      tags: [subscriptions]
      summary: Add a per-subscription override (permission add/remove or feature delta).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionOverride'
      responses:
        '200':
          description: Added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionOverride'

  /api/v1/subscriptions/{subscriptionId}/overrides/{overrideId}:
    parameters:
      - $ref: '#/components/parameters/SubscriptionIdParam'
      - in: path
        name: overrideId
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [subscriptions]
      summary: Remove an override.
      responses:
        '204':
          description: Removed.

  # ============================================================
  # licenses
  # ============================================================
  /api/v1/subscriptions/{subId}/licenses:
    parameters:
      - in: path
        name: subId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [licenses]
      summary: Issue a new license for the subscription.
      description: |
        Signs a fresh Ed25519 license JWT bound to the subscription. The response carries the
        compact JWT (`license`) plus a `downloadUrl` for the `.lic` envelope. Authorized via the
        subscription's owning org (`@tenantAccess.canIssueLicenseForSubscription`).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseIssueRequest'
      responses:
        '201':
          description: License issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseIssueResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/licenses:
    get:
      tags: [licenses]
      summary: List licenses issued for a subscription.
      description: |
        `subscriptionId` is REQUIRED — an unscoped, cross-org enumeration is a tenant leak. The
        caller is authorized against the subscription's owning org.
      parameters:
        - in: query
          name: subscriptionId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [ACTIVE, REVOKED, EXPIRED]
      responses:
        '200':
          description: OK (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LicenseToken'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/licenses/{jti}:
    parameters:
      - $ref: '#/components/parameters/JtiParam'
    get:
      tags: [licenses]
      summary: Get a license record by jti.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseToken'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/licenses/{jti}/download:
    parameters:
      - $ref: '#/components/parameters/JtiParam'
    get:
      tags: [licenses]
      summary: Download the signed `.lic` envelope for a license.
      description: |
        Returns the `.lic` envelope as a JSON attachment (`Content-Disposition: attachment`).
        Revoked licenses return 400. On an issuance-cache miss the server re-issues an equivalent
        license bound to the same subscription so the caller still receives a valid envelope.
      responses:
        '200':
          description: The `.lic` envelope.
          headers:
            Content-Disposition:
              schema: { type: string }
              description: 'attachment; filename="...".lic'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/licenses/{jti}/revoke:
    parameters:
      - $ref: '#/components/parameters/JtiParam'
    post:
      tags: [licenses]
      summary: Revoke a license.
      description: Marks the license REVOKED so it appears in the CRL. Authorized via the license's owning org.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
      responses:
        '204':
          description: Revoked.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/licenses/{jti}/heartbeat:
    parameters:
      - $ref: '#/components/parameters/JtiParam'
    post:
      tags: [licenses]
      summary: Phone-home / lease heartbeat from a licensed node.
      description: |
        Records a seat/node activation for the license: upserts the `(jti, node_id)` activation row
        and stamps `last_seen_at`/`last_seen_ip`. Active seats are counted from activations seen
        within `app.licensing.lease-window`. The licensed app authenticates with an API key (or a
        valid license bearer token) bound to the license's owning org.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatRequest'
      responses:
        '200':
          description: Heartbeat recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/licenses/crl:
    get:
      tags: [licenses]
      summary: Signed certificate-revocation list (compact JWS, typ=crl+jwt).
      description: |
        Public. Returns a compact JWS signed with the active Ed25519 key (verifiable against
        `/.well-known/jwks.json`) whose claims carry `{iss, iat, nextUpdate, revoked:[jti...]}`.
        `nextUpdate` is `now + app.signing.crl-ttl`. Consumed by offline verifiers to fail-close
        revoked licenses.
      security: []
      responses:
        '200':
          description: Signed CRL.
          content:
            application/jwt:
              schema:
                type: string
                description: Compact JWS (header `kid`+`typ=crl+jwt`).

  /api/v1/licenses/revoked:
    get:
      tags: [licenses]
      summary: Legacy JSON revocation list — jtis revoked (optionally since a timestamp).
      security: []
      parameters:
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Revocation list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevocationList'

  # ============================================================
  # keys
  # ============================================================
  /api/v1/admin/keys:
    get:
      tags: [keys]
      summary: List signing keys (public material only).
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SigningKey'

  /api/v1/admin/keys/rotate:
    post:
      tags: [keys]
      summary: Generate a new active Ed25519 signing key and demote the previous one.
      description: Requires `key.rotate`. Retires the current ACTIVE signing key and generates a fresh ACTIVE Ed25519 key.
      responses:
        '200':
          description: New active key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SigningKey'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/keys/rotate-kek:
    post:
      tags: [keys]
      summary: Rotate the key-encryption-key (KEK) — re-encrypt all signing private keys under the active KEK.
      description: |
        Requires `key.rotate`. Re-encrypts every signing key's private material (`signing_keys.private_key_encrypted`)
        under the currently-active KEK selected by `app.signing.active-master-key-id`. This is a pure data
        operation: it does NOT change which signing key is ACTIVE nor what `/.well-known/jwks.json` publishes.
        Run it after adding a new KEK id to `app.signing.master-keys` and pointing `active-master-key-id` at it.
      responses:
        '200':
          description: KEK rotation complete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KekRotationResult'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/keys/{kid}/compromise:
    parameters:
      - in: path
        name: kid
        required: true
        schema: { type: string }
        description: The signing key id (kid) to flag.
    post:
      tags: [keys]
      summary: Flag a signing key as COMPROMISED (drops it from the JWKS immediately).
      description: |
        Requires `key.rotate`. Marks the key COMPROMISED so it is excluded from `/.well-known/jwks.json`
        at the next verifier refresh. If the compromised key was the ACTIVE signing key, a fresh ACTIVE key
        is generated and returned so issuance continues uninterrupted.
      responses:
        '200':
          description: Key flagged compromised (with a replacement when the compromised key had been ACTIVE).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompromiseResult'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # scim (SCIM 2.0 provisioning)
  # ============================================================
  /scim/v2/Users:
    get:
      tags: [scim]
      summary: List / filter SCIM users provisioned in the caller's org.
      description: |
        SCIM 2.0 ListResponse (RFC 7644 §3.4.2). Authenticated with an org-bound API key (or super-admin)
        carrying the `scim.manage` scope; the org is resolved from the key's org binding, so the IdP only
        ever sees users it provisioned in its own tenant. Supports the SCIM `filter=userName eq "x"` form
        and 1-based `startIndex`/`count` pagination. Errors use the SCIM Error shape, not RFC-7807.
      parameters:
        - in: query
          name: filter
          required: false
          schema: { type: string }
          description: 'SCIM filter, e.g. `userName eq "alice@example.com"`.'
        - in: query
          name: startIndex
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
          description: 1-based index of the first result.
        - in: query
          name: count
          required: false
          schema: { type: integer, minimum: 0, default: 100 }
      responses:
        '200':
          description: SCIM ListResponse.
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimListResponse'
        '401':
          $ref: '#/components/responses/ScimUnauthorized'
        '403':
          $ref: '#/components/responses/ScimForbidden'
    post:
      tags: [scim]
      summary: Provision (create) a SCIM user in the caller's org.
      description: |
        Creates (or links) the control-panel user for the IdP-supplied `userName` (email) and records a
        per-org `scim_user_mappings` row keyed by `externalId`. Returns the created SCIM User with its
        per-org resource `id` (the mapping id) and `meta.location`. Requires `scim.manage`.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/ScimUser'
          application/json:
            schema:
              $ref: '#/components/schemas/ScimUser'
      responses:
        '201':
          description: User provisioned.
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        '400':
          $ref: '#/components/responses/ScimBadRequest'
        '409':
          $ref: '#/components/responses/ScimConflict'

  /scim/v2/Users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
        description: The per-org SCIM resource id (the `scim_user_mappings` id), not the raw user id.
    get:
      tags: [scim]
      summary: Fetch a provisioned SCIM user by its per-org resource id.
      responses:
        '200':
          description: SCIM User.
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        '404':
          $ref: '#/components/responses/ScimNotFound'
    put:
      tags: [scim]
      summary: Replace a provisioned SCIM user (full update).
      description: |
        Full-replace semantics per SCIM. Used by IdPs to update the display name or to set `active=false`
        to deprovision — flipping `active` to false suspends the control-panel user and revokes its sessions.
        Requires `scim.manage`.
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: '#/components/schemas/ScimUser'
          application/json:
            schema:
              $ref: '#/components/schemas/ScimUser'
      responses:
        '200':
          description: User updated.
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        '400':
          $ref: '#/components/responses/ScimBadRequest'
        '404':
          $ref: '#/components/responses/ScimNotFound'
    delete:
      tags: [scim]
      summary: Deprovision (delete) a SCIM user mapping.
      description: |
        Removes the per-org SCIM mapping and deactivates the underlying control-panel user (suspends it and
        revokes its sessions); the immutable audit history is preserved. Requires `scim.manage`.
      responses:
        '204':
          description: Deprovisioned.
        '404':
          $ref: '#/components/responses/ScimNotFound'

  # ============================================================
  # billing
  # ============================================================
  /api/v1/orgs/{orgId}/billing/account:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [billing]
      summary: Get the organization's billing account.
      description: |
        Returns the org's `(provider, externalCustomerId, currency)` billing account. Requires `billing.read`
        and access to the org (super-admin, an api-key bound to the org, or org membership). 404 until an
        account exists (one is auto-created the first time an invoice is generated for the org).
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingAccount'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orgs/{orgId}/billing/invoices:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [billing]
      summary: List the organization's invoices (newest first).
      description: Requires `billing.read` and access to the org.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [billing]
      summary: Generate a DRAFT invoice by rating a subscription's usage for its current period.
      description: |
        Rates the subscription's `usage_quotas` into a new DRAFT invoice with per-feature line items and a
        denormalized total. The subscription MUST belong to `{orgId}` (else 404 — never cross-tenant). The
        org billing account is auto-created on first use. Authorized for an org admin/owner (or super-admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceGenerateRequest'
      responses:
        '201':
          description: DRAFT invoice created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orgs/{orgId}/billing/invoices/{invoiceId}:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - in: path
        name: invoiceId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [billing]
      summary: Get an invoice with its rated line items.
      description: Requires `billing.read` and access to the org. 404 if the invoice is not in this org.
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orgs/{orgId}/billing/invoices/{invoiceId}/issue:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - in: path
        name: invoiceId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [billing]
      summary: Finalize a DRAFT invoice (DRAFT -> ISSUED).
      description: |
        Records the charge + finalization with the billing provider, stamps `issuedAt`, and freezes the
        line items/total. Only a DRAFT invoice can be issued (else 409). Audited fail-closed. Authorized
        for an org admin/owner (or super-admin).
      responses:
        '200':
          description: Issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/orgs/{orgId}/billing/invoices/{invoiceId}/void:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
      - in: path
        name: invoiceId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [billing]
      summary: Void a DRAFT or ISSUED invoice (-> VOID).
      description: |
        A PAID or already-VOID invoice is a 409. Audited fail-closed. Authorized for an org admin/owner
        (or super-admin).
      responses:
        '200':
          description: Voided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ============================================================
