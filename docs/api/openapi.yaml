  /api/v1/orgs/{orgId}/audit:
    parameters:
      - $ref: '#/components/parameters/OrgIdParam'
    get:
      tags: [audit]
      summary: Search audit entries scoped to a single organization.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: action
          schema: { type: string }
        - in: query
