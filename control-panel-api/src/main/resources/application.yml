spring:
  application:
    name: control-panel
  # Graceful shutdown: on SIGTERM, stop accepting new requests and let in-flight ones drain
  # (bounded by the per-phase timeout below) instead of cutting connections immediately.
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    # Credentials are REQUIRED (no default). Shipping a packaged jar with a baked-in cp/cp fallback
    # means a misconfigured prod deployment silently connects with well-known credentials, so the
    # ${VAR:?message} form aborts startup when the env var is absent or empty. The dev profile
    # (application-dev.yml) and the test profile (application-test.yml) supply their own local values.
    url: ${DB_URL:?DB_URL must be set (e.g. jdbc:postgresql://postgres:5432/cp)}
    username: ${DB_USER:?DB_USER must be set}
    password: ${DB_PASS:?DB_PASS must be set}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      # Redis backs the session-revocation denylist and the brute-force/lockout counters, so it MUST
      # NOT run unauthenticated on a shared network. The compose redis service now starts with
      # `--requirepass` from REDIS_PASSWORD; supply the same value here. Empty (the local-loopback dev
      # default) means no AUTH is sent, which only works against a passwordless local Redis.
      password: ${REDIS_PASSWORD:}
      # Bound how long a Redis command may block. Without this, a Redis stall blocks every authenticated
      # request for Lettuce's default 60s (the denylist check is on the hot path). Keep it short.
      timeout: ${REDIS_TIMEOUT:2s}
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: 8080
  # Honour X-Forwarded-* headers from the TLS-terminating reverse proxy. Without this Spring sees
  # request.isSecure()=false on every (plain-HTTP, proxy-to-app) hop, so Spring Security NEVER emits
  # the HSTS header and scheme-derived URLs resolve as http. "framework" installs Spring's
  # ForwardedHeaderFilter, which rewrites scheme/host/port/remote-addr from the forwarded headers.
  #
  # OPERATIONAL REQUIREMENT: the fronting proxy MUST set X-Forwarded-Proto (https) and X-Forwarded-For
  # (the real client IP) and MUST strip any client-supplied copies of those headers, since the app now
  # trusts them. Pair with app.audit.trusted-proxies so the audit/access-log client-IP view matches.
  forward-headers-strategy: framework
  # Drain in-flight requests on shutdown (paired with spring.lifecycle.timeout-per-shutdown-phase).
  shutdown: graceful
  max-http-request-header-size: 16KB
  tomcat:
    max-http-form-post-size: 256KB
    max-swallow-size: 256KB

management:
  endpoints:
    web:
      exposure:
        # Minimal set: health (probes), info, and the Prometheus scrape endpoint only. The raw
        # /actuator/metrics tree (per-meter drill-down, URI inventory, latencies) is intentionally NOT
        # web-exposed — Prometheus scrapes /actuator/prometheus instead. Non-health endpoints remain
        # secured via SecurityConfig; this keeps the exposed surface small even if that layer regresses.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      # Expose Kubernetes-style liveness/readiness probe groups at
      # /actuator/health/liveness and /actuator/health/readiness.
      probes:
        enabled: true
  health:
    # Contribute application lifecycle state to the probe groups above.
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  # Tag all Micrometer metrics (incl. /actuator/prometheus) with the application name so
  # dashboards/SLOs can distinguish instances of different services in a shared registry.
  metrics:
    tags:
      application: control-panel
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  # Disabled by default (prod): handing an anonymous client the full enumerated API surface is an
  # information-disclosure aid. The dev profile (application-dev.yml) re-enables both for local use.
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger

app:
  auth:
    session-secret: ${APP_AUTH_SESSION_SECRET:}
    session-ttl: PT30M
    revocation:
      enabled: true
    # Prod default MUST stay false; only application-dev.yml flips this to true.
    expose-reset-token: ${APP_AUTH_EXPOSE_RESET_TOKEN:false}
    # Login lockout / brute-force throttling. Counters are keyed per-account and per-IP; when a
    # RedisConnectionFactory is present they are cluster-safe, otherwise they fall back to in-memory.
    lockout:
      # Failed attempts per account within the window before the account is locked.
      max-attempts: ${APP_AUTH_LOCKOUT_MAX_ATTEMPTS:5}
      # Sliding window over which failed attempts are counted.
      window: ${APP_AUTH_LOCKOUT_WINDOW:PT5M}
      # How long an account stays locked once max-attempts is reached.
      lockout: ${APP_AUTH_LOCKOUT_DURATION:PT15M}
      # Global per-IP failed-attempt ceiling within the window (mitigates spraying across accounts).
      per-ip-max: ${APP_AUTH_LOCKOUT_PER_IP_MAX:20}
  mfa:
    # Master switch for TOTP multi-factor authentication on password logins.
    enabled: ${APP_MFA_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ratelimit:
    auth:
      capacity: ${APP_RATELIMIT_AUTH_CAPACITY:10}
      refill-per-minute: ${APP_RATELIMIT_AUTH_REFILL:10}
  signing:
    # AES master key (base64) used to encrypt signing private keys at rest — required, no default.
    # Legacy single-key property: KeyEncryptor still honours this for back-compat, registering it under
    # the reserved key-encryption-key (KEK) id "default" so blobs encrypted before KEK rotation was
    # introduced keep decrypting. New deployments should prefer the master-keys list below.
    master-key: ${APP_KEY_ENC_MASTER:}
    # Versioned key-encryption keys (KEK) for envelope-encrypting signing private keys at rest.
    # KeyEncryptor binds this as a single STRING of comma/space-separated "id:base64key" entries
    # (NOT a YAML map) — each base64 value decodes to a 16/24/32-byte AES key. active-master-key-id
    # selects which entry encrypts NEW blobs; every listed id (plus the legacy "default" KEK derived
    # from master-key above) can still DECRYPT old blobs, so a KEK rotation is: add a new id, point
    # active-master-key-id at it, then re-encrypt existing rows (KeyService.rotateKek).
    # Default keeps the existing single master key working unchanged: id "v1" maps to APP_KEY_ENC_MASTER
    # and is the active id, so an undecorated deployment behaves exactly as before this property existed
    # (the same key bytes are simply addressed as KEK "v1" instead of the legacy "default").
    active-master-key-id: ${APP_SIGNING_ACTIVE_MASTER_KEY_ID:v1}
    master-keys: ${APP_SIGNING_MASTER_KEYS:v1:${APP_KEY_ENC_MASTER:}}
    issuer: ${APP_ISSUER:https://control-panel.example.com}
    default-audience: ${APP_DEFAULT_AUDIENCE:docker-app-prod}
    crl-ttl: ${APP_CRL_TTL:PT1H}
  usage:
    occurred-at-max-past: P35D
    occurred-at-max-future: PT5M
    enforce-limit: true
  audit:
    # CIDR blocks whose X-Forwarded-For header is trusted; empty => never trust XFF.
    trusted-proxies: ${APP_AUDIT_TRUSTED_PROXIES:}
    fail-closed-actions:
      - license.issued
      - license.revoked
      - key.rotated
      - rbac.role.assigned
      - rbac.role.removed
      - org.owner.transferred
      - apikey.created
      - apikey.revoked
      - sso.provider.created
      - sso.provider.deleted
  billing:
    # ISO-4217 currency code applied to billing records / invoice line items when an org or plan does
    # not pin its own currency.
    currency: ${APP_BILLING_CURRENCY:USD}
    # Default per-unit amount (in the currency's minor units, e.g. cents) used when a plan or usage
    # feature carries no explicit price. 0 = entitlement-only (the product tracks usage but bills nothing).
    default-unit-amount: ${APP_BILLING_DEFAULT_UNIT_AMOUNT:0}
  licenses:
    default-ttl-days: 365
  licensing:
    # Sliding window over which a license_activations row counts as an "active seat": a node that has
    # phoned home (heartbeat) within this window is counted toward seat usage; older rows are stale.
    lease-window: ${APP_LICENSING_LEASE_WINDOW:PT24H}
    # How far ahead of expiry the lifecycle sweeper emits a license.expiring warning (outbox event).
    expiry-warning: ${APP_LICENSING_EXPIRY_WARNING:P14D}
  webhooks:
    # Maximum delivery attempts per (subscription, event) before a webhook_deliveries row is parked in
    # the terminal FAILED state (capped exponential backoff between attempts).
    max-attempts: ${APP_WEBHOOKS_MAX_ATTEMPTS:8}
    # Per-attempt connect+read timeout for the outbound HTTPS POST (java.net.http HttpClient).
    timeout: ${APP_WEBHOOKS_TIMEOUT:PT10S}
  idempotency:
    # Time-to-live for stored Idempotency-Key records; retries within this window replay the original
    # response, after which the key is eligible for the cleanup sweep and may be reused.
    ttl: ${APP_IDEMPOTENCY_TTL:P1D}
  sso:
    enabled: ${APP_SSO_ENABLED:true}
    base-url: ${APP_SSO_BASE_URL:http://localhost:8080}
  ui:
    base-url: ${APP_UI_BASE_URL:http://localhost:5173}
  events:
    listener:
      enabled: ${APP_EVENTS_LISTENER_ENABLED:false}
      poll-ms: 1000
  observability:
    # HTTP access logging (method, path, status, latency, client IP) emitted via the structured
    # logger. Implemented by AccessLogFilter, which is gated on this flag; health-probe traffic is
    # excluded. Enabled by default in prod; application-dev.yml leaves it on with console output.
    access-log:
      enabled: ${APP_ACCESS_LOG_ENABLED:true}
    # Correlation/trace id propagation across HTTP -> DB -> outbox -> NOTIFY hops, surfaced in the
    # structured logs as an MDC field. Always active via CorrelationIdFilter (which binds the
    # `requestId` MDC key consumed by both the plain and JSON encoders in logback-spring.xml); this
    # flag is retained for compatibility / future cross-process propagation toggling.
    tracing:
      enabled: ${APP_TRACING_ENABLED:true}

# The bucket4j Spring Boot starter auto-config requires a configured cache and would fail at
# startup (NoCacheConfiguredException). We do not use it — rate limiting is a custom in-memory
# RateLimitFilter built on the bucket4j-core API — so disable the starter's auto-configuration.
bucket4j:
  enabled: false

# Logging is configured by logback-spring.xml (auto-detected on the classpath; no logging.config
# needed). Prod emits structured JSON via net.logstash.logback; the "dev" profile selects a plain
# console appender (see application-dev.yml). These levels apply regardless of appender.
logging:
  level:
    org.springframework.security: INFO
