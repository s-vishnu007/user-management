# Local development profile overrides (spring.profiles.active=dev).
#
# WARNING: This file MUST NEVER be activated in production. It intentionally
# relaxes security so local developers can self-service password resets and
# debug from a browser dev server. Confirm no prod deployment sets
# spring.profiles.active=dev. The base application.yml keeps every one of these
# values at its safe (prod) default, so accidental packaging of this file is
# harmless unless the dev profile is explicitly activated.

app:
  auth:
    # Return the raw password-reset token in the API response so local devs can
    # complete a reset without an email server. Prod default (application.yml) is false.
    expose-reset-token: true
  cors:
    # Permissive CORS for local front-end dev servers (Vite default + alternates).
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

management:
  endpoint:
    health:
      # Full component breakdown is convenient when debugging locally.
      show-details: always

# Logging: with spring.profiles.active=dev, logback-spring.xml selects a plain, human-readable
# CONSOLE appender instead of the structured JSON used in prod (the <springProfile name="dev">
# block in logback-spring.xml). No logging.config override is required here — Spring auto-detects
# logback-spring.xml and exposes the active profile to it.
logging:
  level:
    # Slightly chattier locally; SQL/binding stays off unless explicitly raised.
    com.example: DEBUG
