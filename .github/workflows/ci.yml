name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (mvn verify)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          # Re-key the cache whenever any pom.xml changes so dependency updates are picked up.
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Docker is preinstalled and running on GitHub-hosted ubuntu-latest runners,
      # so Testcontainers (Postgres via the jdbc:tc URL) works out of the box.
      - name: Build and test
        run: mvn -B verify

      # Always upload JaCoCo reports (report-only; no enforced threshold yet) for inspection.
      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

  dependency-updates:
    name: Dependency updates (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: report informational dependency-update info without failing CI.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Lightweight alternative to OWASP dependency-check: just surface newer
      # dependency versions. Informational only.
      - name: Display dependency updates
        run: mvn -B versions:display-dependency-updates

  dependency-check:
    name: Vulnerability scan (OWASP + npm audit)
    runs-on: ubuntu-latest
    # This job is now a real gate: the OWASP dependency-check step fails the build when a
    # dependency carries a CVE at/above the configured CVSS threshold. (The npm audit step
    # stays informational — see its own continue-on-error.)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Cache the OWASP NVD data feed so scans don't re-download the full CVE database every run.
      # An NVD API key (repo secret NVD_API_KEY) dramatically speeds up and de-flakes the feed
      # update; the scan still runs without it, just slower.
      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-nvd

      # Run the OWASP dependency-check Maven goal across the reactor and FAIL the build on any
      # dependency with a CVSS score >= 7 (High/Critical). The previous value (11) is impossible
      # — the CVSS scale maxes out at 10 — so the gate could never fire; 7 makes it real.
      - name: OWASP dependency-check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >-
          mvn -B org.owasp:dependency-check-maven:check
          -Dformats=HTML,JSON
          -DfailBuildOnCVSS=7
          ${NVD_API_KEY:+-DnvdApiKey=$NVD_API_KEY}

      - name: Upload OWASP dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check
          path: '**/target/dependency-check-report.*'
          if-no-files-found: ignore

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # npm audit on the admin UI lockfile. Non-blocking: report vulnerabilities, never fail CI
      # (the prod bundle is clean; the known advisories are dev-only vite/esbuild issues).
      - name: npm audit (admin-ui)
        continue-on-error: true
        working-directory: admin-ui
        run: npm audit --audit-level=high

  admin-ui:
    name: Admin UI (install, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      # Reproducible install from the committed lockfile.
      - name: Install dependencies
        working-directory: admin-ui
        run: npm ci

      # Type-check the whole project (no emit) so contract/type drift fails CI.
      - name: Type-check
        working-directory: admin-ui
        run: npm run lint

      # Production build (tsc -b && vite build) — catches build-time regressions.
      - name: Build
        working-directory: admin-ui
        run: npm run build
